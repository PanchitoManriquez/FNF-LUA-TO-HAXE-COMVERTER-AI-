<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNF Coder AI - V-Slice</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #090a0f;
            --panel-bg: #11141d;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --neon-yellow: #ffea00;
            --text-main: #e2e8f0;
            --chat-user: #1a2332;
            --chat-ai: #1c1524;
            --success: #4ade80;
            --danger: #ff4c4c;
            --border-glow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 50% 0%, #1a1b26 0%, #090a0f 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER & API KEY */
        header {
            width: 100%; max-width: 900px; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            border-bottom: 2px solid var(--neon-cyan);
            background: rgba(17, 20, 29, 0.8);
            box-shadow: var(--border-glow);
            z-index: 10;
        }

        .header-title {
            font-size: 1.8rem; font-weight: 700; color: var(--neon-cyan);
            text-transform: uppercase; letter-spacing: 1px;
            text-align: center;
        }

        .api-row { display: flex; gap: 6px; align-items: center; }
        
        input[type="password"] {
            flex-grow: 1; padding: 10px 12px; height: 42px; border-radius: 6px;
            border: 1px solid var(--neon-cyan); background: #000; color: #fff;
            font-family: 'Fira Code', monospace; font-size: 0.95rem; min-width: 0;
        }
        input[type="password"]:focus { outline: none; box-shadow: var(--border-glow); }
        input[type="password"]:disabled { 
            background: rgba(74, 222, 128, 0.1); 
            border-color: var(--success); 
            color: var(--success); 
        }

        .api-btn {
            width: 42px; height: 42px; min-width: 42px; padding: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; font-size: 1.2rem; border: none; cursor: pointer;
            transition: transform 0.1s; flex-shrink: 0;
        }
        .api-btn:active { transform: scale(0.95); }
        
        #saveApiBtn { background: var(--neon-cyan); color: #000; }
        #clearApiBtn { background: var(--neon-pink); color: #fff; }

        /* ZONA DE CHAT */
        .chat-container {
            flex-grow: 1; width: 100%; max-width: 900px;
            padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }

        .message { display: flex; flex-direction: column; max-width: 90%; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sender-label { font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; opacity: 0.8; }
        .user .sender-label { color: var(--neon-cyan); text-align: right; }
        .ai .sender-label { color: var(--neon-pink); text-align: left; }

        .bubble {
            padding: 15px; border-radius: 8px; font-size: 1.1rem; line-height: 1.5;
            word-wrap: break-word;
        }
        .user .bubble {
            background: var(--chat-user); border: 1px solid var(--neon-cyan);
        }
        .ai .bubble {
            background: var(--chat-ai); border: 1px solid var(--neon-pink);
        }

        /* BLOQUES DE CÓDIGO CON BOTÓN DE DESCARGA */
        .code-container {
            background: #000; border: 1px solid #333; border-radius: 8px;
            margin-top: 10px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a1a; padding: 8px 12px; border-bottom: 1px solid #333;
        }
        .code-lang {
            color: var(--neon-cyan); font-weight: bold; font-size: 0.85rem; text-transform: uppercase;
            font-family: 'Fira Code', monospace;
        }
        .code-dl-btn {
            background: var(--neon-pink); color: #fff; border: none; padding: 5px 12px;
            border-radius: 4px; font-size: 0.9rem; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; font-weight: bold; text-transform: uppercase;
            transition: all 0.2s;
        }
        .code-dl-btn:hover { background: #fff; color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .code-container pre {
            padding: 15px; margin: 0; overflow-x: auto;
            font-family: 'Fira Code', monospace; font-size: 0.95rem; color: #fff;
        }

        /* ZONA DE INPUT (ABAJO) */
        .input-area {
            width: 100%; max-width: 900px; padding: 15px;
            background: var(--panel-bg); border-top: 2px solid var(--neon-pink);
            display: flex; gap: 10px; align-items: flex-end;
        }

        .upload-btn {
            width: 50px; height: 50px; border-radius: 8px; border: none;
            background: var(--neon-yellow); color: #000; font-size: 2rem; font-weight: bold;
            cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s;
        }
        .upload-btn:hover { transform: scale(1.05); }
        .upload-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

        textarea {
            flex-grow: 1; min-height: 50px; max-height: 150px; padding: 12px;
            border-radius: 8px; border: 1px solid #444; background: #000; color: #fff;
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; resize: none; overflow-y: auto;
        }
        textarea:focus { outline: none; border-color: var(--neon-pink); }

        .send-btn {
            height: 50px; padding: 0 20px; border-radius: 8px; border: none;
            background: var(--neon-pink); color: #fff; font-weight: bold; font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .send-btn:disabled { background: #555; cursor: not-allowed; }

    </style>
</head>
<body>

    <header>
        <div class="header-title">[ FNF CODER AI ]</div>
        <div class="api-row">
            <input type="password" id="apiKey" placeholder="> Pega tu API Key aquí">
            <button id="saveApiBtn" class="api-btn" onclick="guardarApiKey()" title="Guardar API Key">💾</button>
            <button id="clearApiBtn" class="api-btn" onclick="quitarApiKey()" title="Borrar API Key">🗑️</button>
        </div>
    </header>

    <div class="chat-container" id="chatHistory">
        <div class="message ai">
            <div class="sender-label">[IA]</div>
            <div class="bubble">
                ¡Hola! Sistema de Modding FNF V-Slice activado.<br><br>
                Sube tu script de Lua usando el botón <strong>+</strong> abajo, o escribe tu problema. Cualquier código que yo genere tendrá un botón para descargarlo automáticamente. 💾
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="file" id="fileInput" accept=".lua,.txt,.hxc,.hx" style="display: none;">
        
        <button class="upload-btn" id="plusBtn" title="Subir código">+</button>
        
        <textarea id="chatInput" placeholder="> Escribe aquí o sube un archivo..." rows="1" oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
        
        <button class="send-btn" id="sendBtn" onclick="enviarMensaje()">ENVIAR 🚀</button>
    </div>

    <script>
        // --- API KEY CONFIG ---
        document.addEventListener("DOMContentLoaded", function() {
            var savedKey = localStorage.getItem('fnf_gemini_api_key');
            var apiInput = document.getElementById('apiKey');
            if (savedKey) {
                apiInput.value = savedKey;
                apiInput.disabled = true;
                apiInput.placeholder = "> API KEY GUARDADA Y SEGURA";
            }
        });

        function guardarApiKey() {
            var apiInput = document.getElementById('apiKey');
            var apiKey = apiInput.value.trim();
            if (apiKey !== "") {
                localStorage.setItem('fnf_gemini_api_key', apiKey);
                apiInput.disabled = true;
                apiInput.placeholder = "> API KEY GUARDADA Y SEGURA";
                alert("💾 ¡API Key guardada y bloqueada con éxito!");
            } else {
                alert("⚠ ERROR: Ingresa una API Key antes de intentar guardarla.");
            }
        }

        function quitarApiKey() {
            var apiInput = document.getElementById('apiKey');
            apiInput.value = '';
            apiInput.disabled = false;
            apiInput.placeholder = "> Pega tu API Key aquí";
            localStorage.removeItem('fnf_gemini_api_key');
            alert("🗑️ API Key eliminada. Ya puedes escribir una nueva.");
        }

        // --- UI & CHAT LOGIC ---
        const chatHistory = document.getElementById('chatHistory');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const plusBtn = document.getElementById('plusBtn');
        const fileInput = document.getElementById('fileInput');

        let internalContext = "Eres un asistente experto en modding de Friday Night Funkin' V-Slice y programación en Haxe/HScript. El usuario te pasará código Lua de Psych Engine o te hará preguntas. Tu trabajo es convertir ese código a HScript (.hxc) para V-Slice o ayudarle a debugear. Usa SIEMPRE formato markdown (bloques con 3 comillas invertidas ```) para enviar el código, así el sistema puede generar los botones de descarga.\n\n";

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        }

        // --- FILE UPLOAD LOGIC ---
        plusBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const content = e.target.result;
                    // Pre-llenar el textarea con un mensaje y el código
                    chatInput.value = `Convierte este archivo (${file.name}) a V-Slice:\n\n\`\`\`lua\n${content}\n\`\`\``;
                    autoResize(chatInput);
                };
                reader.readAsText(file);
                // Reset input
                fileInput.value = "";
            }
        });

        // --- GEMINI API CALL ---
        async function enviarMensaje() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const text = chatInput.value.trim();

            if (!apiKey) { alert("⚠️ Necesitas poner tu API Key arriba."); return; }
            if (!text) return;

            // Añadir al chat (Usuario)
            agregarMensaje("user", text);
            chatInput.value = "";
            chatInput.style.height = 'auto';
            
            // Estado de carga
            sendBtn.disabled = true;
            plusBtn.disabled = true;
            sendBtn.innerHTML = "...";

            // Preparar el prompt con el contexto
            const promptFinal = internalContext + "Usuario dice:\n" + text;

            // Motor de IA GEMINI 3.5 FLASH (Corregido y Actualizado)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptFinal }] }] })
                });

                const data = await response.json();

                if (response.ok) {
                    let respuestaAI = data.candidates[0].content.parts[0].text;
                    // Formatear markdown (Extrae bloques de código y crea botones de descarga)
                    respuestaAI = formatMarkdown(respuestaAI);
                    agregarMensaje("ai", respuestaAI);
                    
                    // Actualizar contexto corto
                    internalContext = "Recuerda que el usuario recién te dijo esto: " + text.substring(0, 200) + "... Y tú le respondiste con código.\n\n";
                } else {
                    agregarMensaje("ai", `❌ **Error de API:**<br>${data.error.message}`);
                }
            } catch (error) {
                agregarMensaje("ai", `❌ **Error de Conexión:**<br>${error.message}`);
            } finally {
                sendBtn.disabled = false;
                plusBtn.disabled = false;
                sendBtn.innerHTML = "ENVIAR 🚀";
            }
        }

        function agregarMensaje(tipo, htmlText) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${tipo}`;
            
            const label = tipo === 'ai' ? '[IA]' : '[TÚ]';
            
            msgDiv.innerHTML = `
                <div class="sender-label">${label}</div>
                <div class="bubble">${htmlText}</div>
            `;
            
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight; // Auto-scroll
        }

        // --- SISTEMA DE PARSEO DE MARKDOWN Y DESCARGA DE CÓDIGO ---
        let codeBlockCounter = 0;

        function formatMarkdown(text) {
            // Escapar HTML peligroso primero
            text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // Formatear negritas antes de saltos de linea
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Separar el texto en partes para no romper los saltos de línea dentro del código
            let parts = [];
            let regex = /```(.*?)?\n([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;
            
            while ((match = regex.exec(text)) !== null) {
                // Texto normal antes del código (Se le aplican los saltos de línea)
                let textBefore = text.substring(lastIndex, match.index);
                parts.push(textBefore.replace(/\n/g, '<br>'));
                
                codeBlockCounter++;
                let lang = (match[1] || '').trim();
                let code = match[2];
                let codeId = 'codeBlock_' + codeBlockCounter;
                
                // HTML de la caja de código interactiva
                let blockHtml = `
                <div class="code-container">
                    <div class="code-header">
                        <span class="code-lang">${lang || 'hxc'}</span>
                        <button class="code-dl-btn" onclick="descargarCodigo('${codeId}', '${lang}')">💾 Descargar</button>
                    </div>
                    <pre id="${codeId}">${code}</pre>
                </div>`;
                parts.push(blockHtml);
                
                lastIndex = regex.lastIndex;
            }
            
            // Texto normal después del último código
            let textAfter = text.substring(lastIndex);
            parts.push(textAfter.replace(/\n/g, '<br>'));
            
            let finalHtml = parts.join('');

            // Código en línea simple: `codigo`
            finalHtml = finalHtml.replace(/`(.*?)`/g, '<span style="background:#222;color:var(--neon-yellow);padding:2px 4px;border-radius:4px;font-family:monospace;">$1</span>');
            
            return finalHtml;
        }

        // Función para descargar el bloque específico
        window.descargarCodigo = function(id, lang) {
            const preElement = document.getElementById(id);
            if (!preElement) return;
            
            // Obtener el texto del bloque (innerText respeta los saltos de línea)
            let codeContent = preElement.innerText || preElement.textContent;
            
            // Determinar extensión según el lenguaje
            let ext = 'txt';
            let langLower = lang.toLowerCase();
            
            if (langLower.includes('haxe') || langLower.includes('hxc') || langLower === '') ext = 'hxc';
            else if (langLower.includes('lua')) ext = 'lua';
            else if (langLower.includes('json')) ext = 'json';
            else ext = langLower || 'hxc';
            
            // Crear el archivo virtual
            const blob = new Blob([codeContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            // Forzar descarga
            const a = document.createElement('a');
            a.href = url;
            a.download = 'script_generado_' + id.replace('codeBlock_', '') + '.' + ext;
            document.body.appendChild(a);
            a.click();
            
            // Limpiar memoria
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
